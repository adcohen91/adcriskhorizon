name: Deploy to AWS S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Sync HTML files to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} \
            --exclude "*" \
            --include "*.html" \
            --content-type "text/html" \
            --cache-control "max-age=86400" \
            --delete

      - name: Sync CSS files to S3
        run: |
          aws s3 sync css/ s3://${{ secrets.S3_BUCKET_NAME }}/css/ \
            --content-type "text/css" \
            --cache-control "max-age=2592000"

      - name: Sync JS files to S3
        run: |
          aws s3 sync js/ s3://${{ secrets.S3_BUCKET_NAME }}/js/ \
            --content-type "application/javascript" \
            --cache-control "max-age=2592000"

      - name: Sync blog HTML files to S3
        run: |
          aws s3 sync blog/ s3://${{ secrets.S3_BUCKET_NAME }}/blog/ \
            --content-type "text/html" \
            --cache-control "max-age=86400"

      - name: Invalidate CloudFront cache
        env:
          CF_DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ "$CF_DIST_ID" != "PENDING" ] && [ -n "$CF_DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$CF_DIST_ID" \
              --paths "/*"
          else
            echo "CloudFront not yet configured, skipping invalidation"
          fi

      - name: Deployment complete
        run: echo "✅ adcriskhorizon.com deployed successfully"
